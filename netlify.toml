[build]
  command = "npm run build && node scripts/sync-roadmap.mjs && cd netlify/functions && npm install"
  publish = "dist"
  functions = "netlify/functions"

# Runs daily at 19:00 UTC — noon Pacific (11 AM during winter / standard time).
[functions."task-reminders"]
  schedule = "0 19 * * *"

# Prerendered public marketing pages (/, /pricing, /faq, /blog, /blog/*, /updates,
# /privacy, /terms) are written as real static files by scripts/prerender.mjs and
# are served directly — Netlify serves an existing file before applying this rule.
# Everything else (the logged-in app, /apply, /redeem, /talent/*, /task/*, deep
# app links, etc.) falls back to the SPA shell, which is marked noindex.
[[redirects]]
  from = "/*"
  to = "/app.html"
  status = 200
